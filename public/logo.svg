<svg width="160" height="60" viewBox="0 0 160 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lensGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.3" />
      <stop offset="70%" style="stop-color:#DC2626;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="156" height="56" rx="4" fill="#0A0A0A" stroke="#1F1F1F" stroke-width="2"/>

  <!-- Camera body - larger for logo -->
  <rect x="20" y="15" width="45" height="30" rx="3" fill="#1a1a1a" stroke="#333333" stroke-width="1.5"/>

  <!-- Lens - main circle -->
  <circle cx="42.5" cy="30" r="12" fill="url(#lensGrad)" stroke="#DC2626" stroke-width="2"/>

  <!-- Lens reflection -->
  <circle cx="39" cy="26" r="4" fill="#EF4444" opacity="0.6"/>

  <!-- Recording indicator -->
  <circle cx="58" cy="20" r="4" fill="#DC2626">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Viewfinder -->
  <rect x="68" y="22" width="12" height="16" rx="2" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>

  <!-- MCU GUIDE text -->
  <text x="95" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#666666" letter-spacing="2">MCU</text>
  <text x="95" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#DC2626" letter-spacing="1">GUIDE</text>

  <!-- Accent line -->
  <line x1="95" y1="28" x2="145" y2="28" stroke="#DC2626" stroke-width="1" opacity="0.3"/>
</svg>